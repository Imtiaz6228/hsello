name: Build and database check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hsello_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hsello_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hsello_ci?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Lint source
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Detect unused files and dependencies
        run: npm run deadcode

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Apply PostgreSQL migrations
        run: npm run prisma:migrate

      - name: Build frontend and API
        run: npm run build:railway
